<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Score Prediction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: 500; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        input:focus, select:focus { border-color: #667eea; outline: none; }
        .full-width { grid-column: span 2; }
        button { width: 100%; padding: 15px; background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); color: #fff; border: none; border-radius: 5px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px; }
        button:hover { transform: translateY(-2px); }
        .result { margin-top: 30px; padding: 20px; border-radius: 5px; text-align: center; font-size: 24px; font-weight: bold; display: none; }
        .approved { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .declined { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .error { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .loading { text-align: center; margin-top: 20px; display: none; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
    </style>
</head>
<body>
<div class="container">
    <h1>Credit Score Prediction</h1>
    <form id="predictionForm">
        <div class="form-grid">

            <div class="form-group">
                <label>Age</label>
                <input type="number" id="Age" value="28" placeholder="28" required>
            </div>

            <div class="form-group">
                <label>Occupation</label>
                <select id="Occupation" required>
                    <option>Teacher</option>
                    <option>Engineer</option>
                    <option>Doctor</option>
                    <option>Scientist</option>
                    <option>Lawyer</option>
                    <option>Developer</option>
                    <option>Mechanic</option>
                    <option>Accountant</option>
                    <option>Architect</option>
                    <option>Entrepreneur</option>
                    <option>Media_Manager</option>
                    <option>Musician</option>
                    <option>Journalist</option>
                    <option>Manager</option>
                    <option>Writer</option>
                </select>
            </div>

            <div class="form-group">
                <label>Annual Income</label>
                <input type="number" id="Annual_Income" value="34847" placeholder="34847">
            </div>

            <div class="form-group">
                <label>Monthly Salary</label>
                <input type="number" id="Monthly_Inhand_Salary" value="3037" placeholder="3037">
            </div>

            <div class="form-group">
                <label>Bank Accounts</label>
                <input type="number" id="Num_Bank_Accounts" value="2" placeholder="2">
            </div>

            <div class="form-group">
                <label>Credit Cards</label>
                <input type="number" id="Num_Credit_Card" value="4" placeholder="4">
            </div>

            <div class="form-group">
                <label>Interest Rate</label>
                <input type="number" id="Interest_Rate" value="6" placeholder="6">
            </div>

            <div class="form-group">
                <label>Loans</label>
                <input type="number" id="Num_of_Loan" value="1" placeholder="1">
            </div>

            <div class="form-group">
                <label>Delay From Due Date</label>
                <input type="number" id="Delay_from_due_date" value="7" placeholder="7">
            </div>

            <div class="form-group">
                <label>Delayed Payments</label>
                <input type="number" id="Num_of_Delayed_Payment" value="1" placeholder="1">
            </div>

            <div class="form-group">
                <label>Changed Credit Limit</label>
                <input type="number" id="Changed_Credit_Limit" value="7" placeholder="7">
            </div>

            <div class="form-group">
                <label>Credit Inquiries</label>
                <input type="number" id="Num_Credit_Inquiries" value="2" placeholder="2">
            </div>

            <div class="form-group">
                <label>Credit Mix</label>
                <select id="Credit_Mix">
                    <option>Good</option>
                    <option>Bad</option>
                    <option>Standard</option>
                </select>
            </div>

            <div class="form-group">
                <label>Outstanding Debt</label>
                <input type="number" id="Outstanding_Debt" value="605" placeholder="605">
            </div>

            <div class="form-group">
                <label>Credit Utilization Ratio</label>
                <input type="number" id="Credit_Utilization_Ratio" value="38" placeholder="38">
            </div>

            <div class="form-group">
                <label>Credit History Age</label>
                <input type="text" id="Credit_History_Age" value="26 Years and 8 Months" placeholder="26 Years and 8 Months">
            </div>

            <div class="form-group">
                <label>Payment of Minimum Amount</label>
                <select id="Payment_of_Min_Amount">
                    <option>No</option>
                    <option>Yes</option>
                </select>
            </div>

            <div class="form-group">
                <label>Total EMI per Month</label>
                <input type="number" id="Total_EMI_per_month" value="18" placeholder="18">
            </div>

            <div class="form-group">
                <label>Monthly Investment</label>
                <input type="number" id="Amount_invested_monthly" value="40" placeholder="40">
            </div>

            <div class="form-group">
                <label>Payment Behaviour</label>
                <select id="Payment_Behaviour">
                    <option>High_spent_Large_value_payments</option>
                    <option>High_spent_Medium_value_payments</option>
                    <option>High_spent_Small_value_payments</option>
                    <option>Low_spent_Large_value_payments</option>
                    <option>Low_spent_Medium_value_payments</option>
                    <option>Low_spent_Small_value_payments</option>
                </select>
            </div>

            <div class="form-group">
                <label>Monthly Balance</label>
                <input type="number" id="Monthly_Balance" value="484" placeholder="484">
            </div>

        </div>

        <button type="submit">Predict Credit Score</button>
    </form>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="margin-top: 10px;">Processing your request...</p>
    </div>

    <div class="result" id="result"></div>
</div>

<script>
document.getElementById('predictionForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    document.getElementById('loading').style.display='block';
    document.getElementById('result').style.display='none';

    const formData = {
        Age: parseFloat(document.getElementById('Age').value),
        Occupation: document.getElementById('Occupation').value,
        Annual_Income: parseFloat(document.getElementById('Annual_Income').value),
        Monthly_Inhand_Salary: parseFloat(document.getElementById('Monthly_Inhand_Salary').value),
        Num_Bank_Accounts: parseInt(document.getElementById('Num_Bank_Accounts').value),
        Num_Credit_Card: parseInt(document.getElementById('Num_Credit_Card').value),
        Interest_Rate: parseFloat(document.getElementById('Interest_Rate').value),
        Num_of_Loan: parseInt(document.getElementById('Num_of_Loan').value),
        Delay_from_due_date: parseInt(document.getElementById('Delay_from_due_date').value),
        Num_of_Delayed_Payment: parseInt(document.getElementById('Num_of_Delayed_Payment').value),
        Changed_Credit_Limit: parseFloat(document.getElementById('Changed_Credit_Limit').value),
        Num_Credit_Inquiries: parseInt(document.getElementById('Num_Credit_Inquiries').value),
        Credit_Mix: document.getElementById('Credit_Mix').value,
        Outstanding_Debt: parseFloat(document.getElementById('Outstanding_Debt').value),
        Credit_Utilization_Ratio: parseFloat(document.getElementById('Credit_Utilization_Ratio').value),
        Credit_History_Age: document.getElementById('Credit_History_Age').value,
        Payment_of_Min_Amount: document.getElementById('Payment_of_Min_Amount').value,
        Total_EMI_per_month: parseFloat(document.getElementById('Total_EMI_per_month').value),
        Amount_invested_monthly: parseFloat(document.getElementById('Amount_invested_monthly').value),
        Payment_Behaviour: document.getElementById('Payment_Behaviour').value,
        Monthly_Balance: parseFloat(document.getElementById('Monthly_Balance').value)
    };

    try{
        const response = await fetch('/predict',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify(formData)
        });
        const data = await response.json();
        document.getElementById('loading').style.display='none';
        const resultDiv = document.getElementById('result');
        resultDiv.style.display='block';

        if(response.ok){
            if(data.prediction==="Good" || data.prediction==="Good".toLowerCase()){
                resultDiv.className='result approved';
                resultDiv.textContent='✅ Credit Score: Good';
            } else if(data.prediction==="Standard"){
                resultDiv.className='result declined';
                resultDiv.textContent='⚠️ Credit Score: Standard';
            } else {
                resultDiv.className='result declined';
                resultDiv.textContent='❌ Credit Score: Poor';
            }
        } else {
            resultDiv.className='result error';
            resultDiv.textContent=`Error: ${data.error || 'Something went wrong'}`;
        }
    }catch(error){
        document.getElementById('loading').style.display='none';
        const resultDiv=document.getElementById('result');
        resultDiv.style.display='block';
        resultDiv.className='result error';
        resultDiv.textContent='Error: Could not connect to the server';
        console.error(error);
    }
});
</script>
</body>
</html>

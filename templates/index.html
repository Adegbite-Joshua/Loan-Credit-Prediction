<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Approval Prediction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .full-width {
            grid-column: span 2;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            display: none;
        }

        .approved {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .declined {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .error {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .loading {
            text-align: center;
            margin-top: 20px;
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Loan Approval Prediction System</h1>
        
        <form id="predictionForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" min="18" max="100" required>
                </div>

                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="education">Education</label>
                    <select id="education" name="education" required>
                        <option value="">Select Education</option>
                        <option value="High School">High School</option>
                        <option value="Bachelor">Bachelor</option>
                        <option value="Master">Master</option>
                        <option value="PhD">PhD</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="income">Annual Income ($)</label>
                    <input type="number" id="income" name="income" min="0" required>
                </div>

                <div class="form-group">
                    <label for="debt">Existing Debt ($)</label>
                    <input type="number" id="debt" name="debt" min="0" required>
                </div>

                <div class="form-group">
                    <label for="credit_score">Credit Score</label>
                    <input type="number" id="credit_score" name="credit_score" min="300" max="850" required>
                </div>

                <div class="form-group">
                    <label for="loan_amount">Loan Amount ($)</label>
                    <input type="number" id="loan_amount" name="loan_amount" min="0" required>
                </div>

                <div class="form-group">
                    <label for="loan_term">Loan Term (months)</label>
                    <select id="loan_term" name="loan_term" required>
                        <option value="">Select Term</option>
                        <option value="12">12 months</option>
                        <option value="24">24 months</option>
                        <option value="36">36 months</option>
                        <option value="48">48 months</option>
                        <option value="60">60 months</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="num_credit_cards">Number of Credit Cards</label>
                    <input type="number" id="num_credit_cards" name="num_credit_cards" min="0" required>
                </div>

                <div class="form-group">
                    <label for="payment_history">Payment History</label>
                    <select id="payment_history" name="payment_history" required>
                        <option value="">Select Payment History</option>
                        <option value="Good">Good</option>
                        <option value="Bad">Bad</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="employment_status">Employment Status</label>
                    <select id="employment_status" name="employment_status" required>
                        <option value="">Select Status</option>
                        <option value="Employed">Employed</option>
                        <option value="Unemployed">Unemployed</option>
                        <option value="Self-Employed">Self-Employed</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="residence_type">Residence Type</label>
                    <select id="residence_type" name="residence_type" required>
                        <option value="">Select Residence</option>
                        <option value="Rented">Rented</option>
                        <option value="Owned">Owned</option>
                        <option value="Mortgaged">Mortgaged</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label for="marital_status">Marital Status</label>
                    <select id="marital_status" name="marital_status" required>
                        <option value="">Select Marital Status</option>
                        <option value="Single">Single</option>
                        <option value="Married">Married</option>
                        <option value="Divorced">Divorced</option>
                        <option value="Widowed">Widowed</option>
                    </select>
                </div>
            </div>

            <button type="submit">Check Loan Eligibility</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px;">Processing your request...</p>
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Show loading spinner
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            
            // Collect form data
            const formData = {
                age: parseInt(document.getElementById('age').value),
                gender: document.getElementById('gender').value,
                education: document.getElementById('education').value,
                income: parseFloat(document.getElementById('income').value),
                debt: parseFloat(document.getElementById('debt').value),
                credit_score: parseInt(document.getElementById('credit_score').value),
                loan_amount: parseFloat(document.getElementById('loan_amount').value),
                loan_term: parseInt(document.getElementById('loan_term').value),
                num_credit_cards: parseInt(document.getElementById('num_credit_cards').value),
                payment_history: document.getElementById('payment_history').value,
                employment_status: document.getElementById('employment_status').value,
                residence_type: document.getElementById('residence_type').value,
                marital_status: document.getElementById('marital_status').value
            };

            try {
                // Make POST request to Flask endpoint
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();
                
                // Hide loading spinner
                document.getElementById('loading').style.display = 'none';
                
                // Display result
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';
                
                if (response.ok) {
                    if (data.prediction === 1 || data.prediction === "1") {
                        resultDiv.className = 'result approved';
                        resultDiv.textContent = '✅ LOAN APPROVED';
                    } else {
                        resultDiv.className = 'result declined';
                        resultDiv.textContent = '❌ LOAN DECLINED';
                    }
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `Error: ${data.error || 'Something went wrong'}`;
                }
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Error: Could not connect to the server';
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
